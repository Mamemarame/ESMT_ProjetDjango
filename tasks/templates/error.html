<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Erreur - ESMT</title>
    <style>
        body { background-color: #ffffff; font-family: 'Segoe UI', sans-serif; color: #333; margin: 0; }
        .navbar { background-color: #87CEEB; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .container { padding: 40px; max-width: 600px; margin: auto; text-align: center; }
        .error-box { background: #fff3f3; border-left: 5px solid #e74c3c; border-radius: 8px; padding: 20px; margin-top: 30px; }
        .btn { background-color: #87CEEB; color: white; padding: 8px 16px; text-decoration: none; border-radius: 4px; font-weight: bold; display: inline-block; margin-top: 20px; }
        .btn:hover { background-color: #00BFFF; }
    </style>
</head>
<body>
    <div class="navbar">
        <h2>ESMT Collaboratif</h2>
    </div>
    <div class="container">
        <div class="error-box">
            <h3>⚠️ Accès refusé</h3>
            <p>{{ msg }}</p>
        </div>
        <a href="{% url 'dashboard' %}" class="btn">Retour au tableau de bord</a>
    </div>
</body>
</html>
