<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion - ESMT</title>
    <style>
        body { background-color: #ffffff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #f9f9f9; padding: 40px; border-radius: 8px; border-top: 5px solid #87CEEB; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 350px; }
        h2 { color: #0056b3; text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; background-color: #87CEEB; color: white; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn:hover { background-color: #00BFFF; }
        .links { text-align: center; margin-top: 15px; font-size: 14px; }
        .links a { color: #87CEEB; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Connexion</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn">Se connecter</button>
        </form>
        <div class="links">
            <p>Pas encore de compte ? <a href="{% url 'register' %}">S'inscrire ici</a></p>
        </div>
    </div>
</body>
</html>
